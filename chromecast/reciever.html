<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      
      /* 1. Put the image directly on the body so it NEVER animates */
      background-image: url("idle.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    
    cast-media-player {
      --theme-hue: 210; 
      
      /* 2. Make Google's background completely transparent so your body image shows through */
      --background-color: transparent;
      --splash-color: transparent;
      --background-image: none;
      --splash-image: none;
      
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <!-- The UI element that displays the video -->
  <cast-media-player></cast-media-player>

  <script>
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    const playbackConfig = new cast.framework.PlaybackConfig();
    playbackConfig.autoSelectOnUnknownTextTrackFormat = true;
    playbackConfig.shakaConfig = {
      streaming: {
        bufferingGoal: 30,
        rebufferingGoal: 10,
        jumpLargeGaps: true
      }
    };

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      (request) => {
        if (request.media && request.media.contentId) {
          const url = request.media.contentId.toLowerCase();
          if (!request.media.contentType) {
            if (url.includes('.mkv')) request.media.contentType = 'video/x-matroska';
            else if (url.includes('.mp4')) request.media.contentType = 'video/mp4';
          }
        }
        return request;
      }
    );

    // Hide the body background once the video actually starts playing!
    playerManager.addEventListener(cast.framework.events.EventType.PLAYING, () => {
      document.body.style.backgroundImage = 'none';
    });
    
    // Bring it back if the video stops
    playerManager.addEventListener(cast.framework.events.EventType.MEDIA_FINISHED, () => {
      document.body.style.backgroundImage = 'url("idle.png")';
    });

    context.start({ playbackConfig: playbackConfig });
  </script>
</body>
</html>
